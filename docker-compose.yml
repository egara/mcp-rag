services:
  postgresql:
    image: pgvector/pgvector:pg16
    container_name: postgresql-pgvector
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-rag_user}", "-d", "${POSTGRES_DB:-rag_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-rag:
    image: mcp-rag:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-rag
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgresql
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-rag_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rag_password}
      - POSTGRES_DB=${POSTGRES_DB:-rag_db}
    depends_on:
      postgresql:
        condition: service_healthy
